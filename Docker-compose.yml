version: '3.9'

services:
  app_todolist:
    build: .
    mem_limit: 512m
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://database:3306/todo_list?createDatabaseIfNotExist=true&serverTimezone=UTC
      - DB_USERNAME=root
      - DB_PASSWORD=ADMIN
    restart: always
    depends_on:
      - database

  database:
    image: mysql:8.0.33
    environment:
      MYSQL_ROOT_PASSWORD: ADMIN
      MYSQL_DATABASE: todo_list
      MYSQL_USER: root
      MYSQL_PASSWORD: ADMIN
    ports: 
      - "3306:3306"
